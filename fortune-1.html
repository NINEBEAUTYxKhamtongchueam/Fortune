<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คำทำนาย</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    .btn-save {
      margin-top: 16px;
      padding: 10px 28px;
      background-color: #fff;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-family: sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .hint {
      margin-top: 10px;
      color: #aaa;
      font-size: 13px;
      font-family: sans-serif;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <img src="fortune-1.jpg" alt="คำทำนาย">
  <a class="btn-save" href="fortune-1.jpg" download="fortune-1.jpg">บันทึกรูปภาพ</a>
  <p class="hint">หรือแตะค้างที่รูปเพื่อบันทึก</p>
</body>
</html>
